<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — Doordarshan</title>
    <link rel="stylesheet" href="/css/style.css">
  </head>
  <body>
    <header class="topbar">
      <div class="container">
        <a class="brand" href="dashboard">
          <div class="brand-icon">📡</div>
          Doordarshan
        </a>

        <div class="nav-actions">
          <div
            class="flex items-center gap-2"
            id="user-badge"
            style="cursor: default"
          ></div>
          <button
            class="btn btn-secondary btn-sm"
            onclick="window.DoordarshAuth.logout()"
          >
            Sign Out
          </button>
        </div>
      </div>
    </header>

    <main>
      <div class="container dashboard-layout">
        <section aria-label="Quick actions">
          <div class="quick-actions">
            <button class="quick-action" id="qa-new-room">
              <div class="quick-action-icon blue">📹</div>
              <div class="quick-action-title">New Room</div>
              <div class="quick-action-desc">Start a call right now</div>
            </button>

            <button class="quick-action" id="qa-join-room">
              <div class="quick-action-icon green">🔗</div>
              <div class="quick-action-title">Join by Code</div>
              <div class="quick-action-desc">Enter a room code</div>
            </button>

            <button class="quick-action" id="qa-schedule">
              <div class="quick-action-icon purple">📅</div>
              <div class="quick-action-title">Schedule Meeting</div>
              <div class="quick-action-desc">Pick a date and time</div>
            </button>
          </div>
        </section>

        <section aria-label="Join by room code">
          <div class="join-bar">
            <div class="form-group">
              <label class="form-label" for="join-code-input">Room code</label>
              <input
                class="form-input"
                type="text"
                id="join-code-input"
                placeholder="e.g. ABC-123"
                maxlength="20"
                spellcheck="false"
                autocomplete="off"
              />
            </div>
            <button class="btn btn-primary" id="join-code-btn">Join</button>
          </div>
        </section>

        <section aria-label="Your rooms" id="rooms-section">
          <div class="section-header">
            <h2>Rooms</h2>
            <button
              class="btn btn-secondary btn-sm"
              onclick="openModal('create-room-modal')"
            >
              + New Room
            </button>
          </div>
          <div class="rooms-grid" id="rooms-grid">
            <div class="empty-state">
              <div class="spinner" style="margin: auto"></div>
            </div>
          </div>
        </section>

        <section aria-label="Meetings">
          <div class="section-header">
            <h2>Meetings</h2>
            <button
              class="btn btn-secondary btn-sm"
              onclick="openModal('schedule-meeting-modal')"
            >
              + Schedule
            </button>
          </div>
          <div class="meetings-list" id="meetings-list">
            <div class="empty-state">
              <div class="spinner" style="margin: auto"></div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <div
      class="modal-overlay"
      id="create-room-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="create-room-title"
    >
      <div class="modal">
        <div class="modal-header">
          <h3 id="create-room-title">Create Room</h3>
          <button
            class="btn btn-ghost btn-sm"
            data-close-modal="create-room-modal"
            aria-label="Close"
          >
            ✕
          </button>
        </div>
        <form id="create-room-form">
          <div class="modal-body">
            <div class="form-group">
              <label class="form-label" for="room-title">Room name</label>
              <input
                class="form-input"
                type="text"
                id="room-title"
                placeholder="e.g. Engineering standup"
                minlength="1"
                maxlength="100"
                required
                autofocus
              />
            </div>
            <span class="form-error" id="create-room-error"></span>
            <p class="form-hint">
              A unique room code will be generated automatically.
            </p>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-close-modal="create-room-modal"
            >
              Cancel
            </button>
            <button type="submit" class="btn btn-primary" id="create-room-btn">
              Create Room
            </button>
          </div>
        </form>
      </div>
    </div>

    <div
      class="modal-overlay"
      id="schedule-meeting-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="schedule-meeting-title"
    >
      <div class="modal">
        <div class="modal-header">
          <h3 id="schedule-meeting-title">Schedule Meeting</h3>
          <button
            class="btn btn-ghost btn-sm"
            data-close-modal="schedule-meeting-modal"
            aria-label="Close"
          >
            ✕
          </button>
        </div>
        <form id="schedule-meeting-form">
          <div class="modal-body">
            <div class="form-group">
              <label class="form-label" for="meeting-title">Title</label>
              <input
                class="form-input"
                type="text"
                id="meeting-title"
                placeholder="Meeting title"
                maxlength="100"
                required
              />
            </div>
            <div class="form-group">
              <label class="form-label" for="meeting-desc"
                >Description (optional)</label
              >
              <input
                class="form-input"
                type="text"
                id="meeting-desc"
                placeholder="What is this meeting about?"
                maxlength="500"
              />
            </div>
            <div class="form-group">
              <label class="form-label" for="meeting-time"
                >Date &amp; time</label
              >
              <input
                class="form-input"
                type="datetime-local"
                id="meeting-time"
              />
            </div>
            <span class="form-error" id="schedule-meeting-error"></span>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-close-modal="schedule-meeting-modal"
            >
              Cancel
            </button>
            <button
              type="submit"
              class="btn btn-primary"
              id="schedule-meeting-btn"
            >
              Schedule
            </button>
          </div>
        </form>
      </div>
    </div>

    <div id="toast-container"></div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
      // Modal helpers used inline by buttons
      function openModal(id) {
        document.getElementById(id)?.classList.add("open");
      }
      function closeModal(id) {
        document.getElementById(id)?.classList.remove("open");
      }
    </script>
    <script src="/js/dashboard.js"></script>
  </body>
</html>
