name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t doordarshan:latest .

      - name: Push Docker image
        run: |
          docker tag doordarshan:latest ${{ secrets.DOCKER_USERNAME }}/doordarshan:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/doordarshan:latest

      - name: SSH Deploy Placeholder
        run: |
          echo "# Add your server SSH deploy command here"
